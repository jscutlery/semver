name: Release

description: Release packages

inputs:
  github_token:
    description: GitHub token
    required: true
  npm_token:
    description: NPM token
    required: true

runs:
  using: composite
  steps:
    - name: Configure npm authentication
      shell: bash
      env:
        NPM_TOKEN: ${{ inputs.npm_token }}
      run: |
        # Use the npmrc file created by setup-node action if it exists
        if [ -n "$NPM_CONFIG_USERCONFIG" ] && [ -f "$NPM_CONFIG_USERCONFIG" ]; then
          # Replace the existing auth token line instead of appending a duplicate,
          # because setup-node writes a line referencing ${NODE_AUTH_TOKEN} which
          # would take precedence and cause a 401.
          sed -i 's|//registry.npmjs.org/:_authToken=.*|//registry.npmjs.org/:_authToken='"${NPM_TOKEN}"'|' "$NPM_CONFIG_USERCONFIG"
        else
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
        fi
        npm whoami

    - name: Version
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
      # Use npx instead of yarn because yarn automagically sets NPM_* environment variables
      # like NPM_CONFIG_REGISTRY so npm publish ends up ignoring the .npmrc file
      # which is set up by `setup-node` action.
      shell: bash
      run: npx nx affected --base=last-release --target=version

    - name: Tag last-release
      shell: bash
      run: git tag -f last-release

    - name: Push changes
      uses: ad-m/github-push-action@master
      with:
        github_token: ${{ inputs.github_token }}
        branch: ${{ github.ref }}
        force: true
        tags: true
