name: Test

description: Test

inputs:
  codecov_token:
    description: Codecov token
    required: true

runs:
  using: composite

  steps:
    - name: Format check
      shell: bash
      run: pnpm nx format:check --base=last-release
    - name: Lint
      shell: bash
      run: pnpm nx affected:lint --base=last-release
    - name: Build
      shell: bash
      run: pnpm nx affected:build --base=last-release
    - name: Test
      shell: bash
      run: pnpm nx affected:test --base=last-release -c=ci
    - name: E2E
      shell: bash
      run: pnpm nx affected:e2e --base=last-release
    - name: Codecov upload
      uses: codecov/codecov-action@v3
      with:
        token: ${{ inputs.codecov_token }}
